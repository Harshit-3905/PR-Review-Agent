name: Reusable AI PR Review

on:
  workflow_call:
    inputs:
      openai-model:
        description: 'The OpenAI model to use'
        required: false
        default: 'gpt-4o'
        type: string
      gemini-model:
        description: 'The Gemini model to use'
        required: false
        default: 'gemini-2.0-flash'
        type: string
      anthropic-model:
        description: 'The Anthropic model to use'
        required: false
        default: 'claude-sonnet-4-20250514'
        type: string
    secrets:
      OPENAI_API_KEY:
        description: 'OpenAI API key used to generate reviews'
        required: false
      GEMINI_API_KEY:
        description: 'Google Gemini API key used to generate reviews'
        required: false
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key used to generate reviews'
        required: false

jobs:
  review:
    name: Run AI Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Review Agent Code
        uses: actions/checkout@v4
        with:
          repository: Harshit-3905/PR-Review-Agent

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run AI Review
        run: npm run review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.openai-model }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ inputs.gemini-model }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ inputs.anthropic-model }}
