name: 'AI PR Review Agent'
description: 'An AI-powered PR review agent that reviews diffs and leaves constructive comments'
branding:
  icon: 'eye'
  color: 'blue'

inputs:
  openrouter-api-key:
    description: 'OpenRouter API key used to generate the reviews (default provider)'
    required: false
  openrouter-model:
    description: 'The OpenRouter model to use for generating code reviews'
    required: false
    default: 'openrouter/free'
  openai-api-key:
    description: 'OpenAI API key used to generate the reviews'
    required: false
  openai-model:
    description: 'The OpenAI model to use for generating code reviews'
    required: false
    default: 'gpt-4o'
  github-token:
    description: 'GitHub token to fetch PR diffs and post comments'
    required: false
    default: ${{ github.token }}
  gemini-api-key:
    description: 'Google Gemini API key used to generate the reviews'
    required: false
  gemini-model:
    description: 'The Gemini model to use for generating code reviews'
    required: false
    default: 'gemini-2.0-flash'
  anthropic-api-key:
    description: 'Anthropic API key used to generate the reviews'
    required: false
  anthropic-model:
    description: 'The Anthropic model to use for generating code reviews'
    required: false
    default: 'claude-sonnet-4-20250514'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Action Dependencies
      run: npm ci --prefix ${{ github.action_path }}
      shell: bash

    - name: Run AI PR Review
      run: npx tsx ${{ github.action_path }}/scripts/review.ts
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        OPENROUTER_MODEL: ${{ inputs.openrouter-model }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        OPENAI_MODEL: ${{ inputs.openai-model }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        GEMINI_MODEL: ${{ inputs.gemini-model }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        ANTHROPIC_MODEL: ${{ inputs.anthropic-model }}
